body:
  text: 晉陽秋太興中衡陽區純作鼠市四方丈餘開門門有一木縱四五鼠於中欲出門木人輒以框拒之吳有葛衡字思直明達天官能於機巧作渾天使地居中以機動之若天轉而地正以上應晷度高貴鄉公神明爽俊德音宣朗景王曰上何如主也鍾會對曰才同陳思武類太祖景王曰若如卿言社稷之福也有星赤而芒角自東北往西南沒于諸葛亮營俄而亮卒張華將死中台星遂折太元中復還合正太傅謝安為相所致也袁宏字彥伯謝安賞其機捷辨速自吏部郎出為東陽郡乃祖之於冶亭時賢皆集安欲卒迫試之執手將別顧左右取一扇而贈之宏應聲答曰輒當奉揚仁風慰彼黎庶合坐歎其要捷丁卯葬高貴鄉公于洛陽西北三十里瀍澗之濱下車數乘不設旌旐百姓相聚而觀之曰是前日所殺天子也或掩面而泣悲不自勝
